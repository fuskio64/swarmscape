<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Swarmscape — emergent particle life</title>
<style>
  :root {
    --bg: #05060a;
    --panel-bg: rgba(12, 14, 22, 0.72);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #e8eaf2;
    --text-dim: #8b8fa3;
    --accent: #7dd3fc;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .panel {
    position: fixed;
    top: 16px;
    left: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: 16px 18px;
    width: 280px;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .panel h1 {
    font-size: 15px;
    margin: 0 0 4px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .panel .sub {
    color: var(--text-dim);
    margin: 0 0 14px;
    line-height: 1.4;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .row label {
    color: var(--text-dim);
    white-space: nowrap;
  }
  .row output {
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    min-width: 34px;
    text-align: right;
  }
  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  select {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 5px 6px;
    border-radius: 7px;
    font-size: 12.5px;
  }
  .switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex: none;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .track {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.14);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .switch .track::after {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    left: 3px; top: 3px;
    background: var(--text);
    border-radius: 50%;
    transition: transform 0.15s ease;
  }
  .switch input:checked + .track { background: var(--accent); }
  .switch input:checked + .track::after { transform: translateX(16px); background: #06121a; }
  .section-label {
    color: var(--text-dim);
    margin: 4px 0 8px;
  }
  .matrix-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  #matrix {
    border-radius: 8px;
    cursor: ns-resize;
    box-shadow: 0 0 0 1px var(--panel-border);
  }
  .btns {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  button {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 8px 6px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s ease;
  }
  button:hover { background: rgba(255,255,255,0.13); }
  button:active { transform: translateY(1px); }
  .hint {
    position: fixed;
    bottom: 14px;
    left: 16px;
    color: var(--text-dim);
    font-size: 11.5px;
    opacity: 0.7;
    user-select: none;
    max-width: 60vw;
  }
  .toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    width: 34px;
    height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    backdrop-filter: blur(10px);
  }
  .panel.hidden {
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<button class="toggle" id="toggleUI" title="Hide panel">‒</button>

<div class="panel" id="panel">
  <h1>Swarmscape</h1>
  <p class="sub">Colored particles pulled and pushed by an invisible rulebook. No two runs are alike.</p>

  <div class="row">
    <label for="species">species</label>
    <input type="range" id="species" min="2" max="6" value="4" step="1">
    <output id="speciesVal">4</output>
  </div>
  <div class="row">
    <label for="count">particles</label>
    <input type="range" id="count" min="200" max="2400" value="1000" step="100">
    <output id="countVal">1000</output>
  </div>
  <div class="row">
    <label for="speed">speed</label>
    <input type="range" id="speed" min="0.2" max="2.5" value="1" step="0.1">
    <output id="speedVal">1.0</output>
  </div>
  <div class="row">
    <label for="trail">trails</label>
    <input type="range" id="trail" min="0.02" max="0.35" value="0.10" step="0.01">
    <output id="trailVal">0.10</output>
  </div>
  <div class="row">
    <label for="style">style</label>
    <select id="style">
      <option value="balanced">balanced</option>
      <option value="orderly">orderly</option>
      <option value="chaotic">chaotic</option>
    </select>
  </div>
  <div class="row">
    <label for="wrap">wrap edges</label>
    <label class="switch">
      <input type="checkbox" id="wrap" checked>
      <span class="track"></span>
    </label>
  </div>

  <p class="section-label">rulebook — drag a cell up/down to bend it</p>
  <div class="matrix-wrap">
    <canvas id="matrix" width="176" height="176"></canvas>
  </div>

  <div class="btns">
    <button id="shuffle">🎲 shuffle</button>
    <button id="reset">↺ reset</button>
    <button id="link">🔗 link</button>
  </div>
</div>

<div class="hint">click / drag canvas to stir · space to pause · drag rulebook cells to edit forces</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const palette = [
    '#ff5d8f', '#7dd3fc', '#ffd166', '#8be38f', '#c084fc', '#ff9770'
  ];

  // --- seeded RNG so a universe can be reproduced from a short link ---
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function randIn(rng, a, b) { return a + rng() * (b - a); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  const state = {
    seed: (Date.now() ^ (Math.random() * 0xffffffff)) >>> 0,
    speciesCount: 4,
    particleCount: 1000,
    speed: 1,
    trail: 0.10,
    style: 'balanced',
    wrap: true,
    paused: false,
    rng: null,
    rules: [],  // rules[a][b] = force coefficient species a feels toward species b
    radii: [],  // radii[a][b] = interaction radius
    particles: []
  };

  function makeRules(n, style, rng) {
    const rules = [], radii = [];
    for (let a = 0; a < n; a++) { rules.push(new Array(n).fill(0)); radii.push(new Array(n).fill(0)); }
    for (let a = 0; a < n; a++)
      for (let b = 0; b < n; b++)
        radii[a][b] = randIn(rng, 40, 160);

    if (style === 'orderly') {
      for (let a = 0; a < n; a++) {
        rules[a][a] = -0.25 - rng() * 0.35; // self-repel: keeps a species from collapsing to a point
        for (let b = a + 1; b < n; b++) {
          const x = randIn(rng, -0.9, 0.9);
          rules[a][b] = x;
          rules[b][a] = -x * (0.5 + rng() * 0.6); // asymmetric pair -> chase/orbit behavior
        }
      }
    } else if (style === 'balanced') {
      for (let a = 0; a < n; a++)
        for (let b = 0; b < n; b++)
          rules[a][b] = (a === b) ? (-0.2 - rng() * 0.4) : randIn(rng, -0.8, 0.8);
    } else { // chaotic
      for (let a = 0; a < n; a++)
        for (let b = 0; b < n; b++)
          rules[a][b] = randIn(rng, -1, 1);
    }
    return { rules, radii };
  }

  function seedParticles() {
    state.particles = [];
    for (let i = 0; i < state.particleCount; i++) {
      state.particles.push({
        x: state.rng() * W,
        y: state.rng() * H,
        vx: 0,
        vy: 0,
        s: Math.floor(state.rng() * state.speciesCount)
      });
    }
  }

  function newRules(freshSeed) {
    if (freshSeed) state.seed = (Date.now() ^ (Math.random() * 0xffffffff)) >>> 0;
    state.rng = mulberry32(state.seed);
    const { rules, radii } = makeRules(state.speciesCount, state.style, state.rng);
    state.rules = rules;
    state.radii = radii;
    drawMatrix();
    updateURL();
  }

  function reset(freshSeed) {
    newRules(freshSeed);
    seedParticles();
  }

  // spatial grid for cheap neighbor queries
  let grid, cellSize, cols, rows;

  function buildGrid() {
    cellSize = 90;
    cols = Math.max(1, Math.ceil(W / cellSize));
    rows = Math.max(1, Math.ceil(H / cellSize));
    grid = new Array(cols * rows);
    for (let i = 0; i < grid.length; i++) grid[i] = [];
  }

  function cellIndex(x, y) {
    let cx = Math.floor(x / cellSize);
    let cy = Math.floor(y / cellSize);
    cx = Math.max(0, Math.min(cols - 1, cx));
    cy = Math.max(0, Math.min(rows - 1, cy));
    return cy * cols + cx;
  }

  const pointer = { x: -9999, y: -9999, active: false };

  function step() {
    buildGrid();
    for (const p of state.particles) grid[cellIndex(p.x, p.y)].push(p);

    const maxR = 170;
    const reachCells = Math.ceil(maxR / cellSize);

    for (const p of state.particles) {
      let fx = 0, fy = 0;
      const cx = Math.floor(p.x / cellSize);
      const cy = Math.floor(p.y / cellSize);

      for (let gy = cy - reachCells; gy <= cy + reachCells; gy++) {
        if (gy < 0 || gy >= rows) continue;
        for (let gx = cx - reachCells; gx <= cx + reachCells; gx++) {
          if (gx < 0 || gx >= cols) continue;
          const bucket = grid[gy * cols + gx];
          for (const q of bucket) {
            if (q === p) continue;
            let dx = q.x - p.x;
            let dy = q.y - p.y;
            const d2 = dx * dx + dy * dy;
            const r = state.radii[p.s][q.s];
            if (d2 > r * r || d2 < 1) continue;
            const d = Math.sqrt(d2);
            const g = state.rules[p.s][q.s];
            const force = g / d;
            fx += (dx / d) * force;
            fy += (dy / d) * force;
          }
        }
      }

      if (pointer.active) {
        const dx = pointer.x - p.x, dy = pointer.y - p.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < 220 * 220 && d2 > 4) {
          const d = Math.sqrt(d2);
          fx += (dx / d) * 0.6;
          fy += (dy / d) * 0.6;
        }
      }

      p.vx = (p.vx + fx * 0.06) * 0.86;
      p.vy = (p.vy + fy * 0.06) * 0.86;
      p.x += p.vx * state.speed;
      p.y += p.vy * state.speed;

      if (state.wrap) {
        if (p.x < 0) p.x += W; else if (p.x > W) p.x -= W;
        if (p.y < 0) p.y += H; else if (p.y > H) p.y -= H;
      } else {
        if (p.x < 0) { p.x = 0; p.vx *= -1; } else if (p.x > W) { p.x = W; p.vx *= -1; }
        if (p.y < 0) { p.y = 0; p.vy *= -1; } else if (p.y > H) { p.y = H; p.vy *= -1; }
      }
    }
  }

  function draw() {
    ctx.fillStyle = `rgba(5, 6, 10, ${state.trail})`;
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';
    for (const p of state.particles) {
      ctx.fillStyle = palette[p.s % palette.length];
      ctx.globalAlpha = 0.28;
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
      ctx.globalAlpha = 1;
      ctx.fillRect(p.x - 1.1, p.y - 1.1, 2.2, 2.2);
    }
    ctx.globalCompositeOperation = 'source-over';
  }

  function loop() {
    if (!state.paused) {
      step();
      draw();
    }
    requestAnimationFrame(loop);
  }

  // --- rulebook matrix: view + drag-to-edit ---
  const matrixCanvas = document.getElementById('matrix');
  const mctx = matrixCanvas.getContext('2d');
  const MATRIX_SIZE = 176;
  let dragCell = null, dragLastY = 0;

  function ruleColor(v) {
    const t = (v + 1) / 2; // 0..1, negative=repel(warm) positive=attract(cool)
    const r = Math.round(235 * (1 - t) + 35 * t);
    const g = Math.round(46 * (1 - Math.abs(v)) + 24);
    const b = Math.round(235 * t + 35 * (1 - t));
    return `rgb(${r},${g},${b})`;
  }

  function drawMatrix() {
    const n = state.speciesCount;
    const cell = MATRIX_SIZE / n;
    mctx.clearRect(0, 0, MATRIX_SIZE, MATRIX_SIZE);
    for (let a = 0; a < n; a++) {
      for (let b = 0; b < n; b++) {
        mctx.fillStyle = ruleColor(state.rules[a][b]);
        mctx.fillRect(b * cell + 1, a * cell + 1, cell - 2, cell - 2);
      }
    }
    for (let i = 0; i < n; i++) {
      mctx.fillStyle = palette[i % palette.length];
      mctx.fillRect(i * cell + cell / 2 - 3, MATRIX_SIZE - 4, 6, 4);
      mctx.fillRect(0, i * cell + cell / 2 - 3, 4, 6);
    }
  }

  function matrixCellAt(clientX, clientY) {
    const rect = matrixCanvas.getBoundingClientRect();
    const n = state.speciesCount;
    const cell = MATRIX_SIZE / n;
    const x = (clientX - rect.left) * (MATRIX_SIZE / rect.width);
    const y = (clientY - rect.top) * (MATRIX_SIZE / rect.height);
    const b = clamp(Math.floor(x / cell), 0, n - 1);
    const a = clamp(Math.floor(y / cell), 0, n - 1);
    return { a, b };
  }

  matrixCanvas.addEventListener('pointerdown', e => {
    dragCell = matrixCellAt(e.clientX, e.clientY);
    dragLastY = e.clientY;
    matrixCanvas.setPointerCapture(e.pointerId);
  });
  matrixCanvas.addEventListener('pointermove', e => {
    if (!dragCell) return;
    const dy = dragLastY - e.clientY; // drag up = strengthen attraction
    dragLastY = e.clientY;
    const { a, b } = dragCell;
    state.rules[a][b] = clamp(state.rules[a][b] + dy * 0.012, -1, 1);
    drawMatrix();
  });
  window.addEventListener('pointerup', () => {
    if (dragCell) { dragCell = null; updateURL(); }
  });

  // --- shareable permalink: seed + params + (possibly hand-edited) rules ---
  function encodeState() {
    const params = new URLSearchParams({
      seed: state.seed,
      species: state.speciesCount,
      count: state.particleCount,
      speed: state.speed,
      trail: state.trail,
      style: state.style,
      wrap: state.wrap ? 1 : 0,
      rules: state.rules.flat().map(v => v.toFixed(2)).join(',')
    });
    return params.toString();
  }

  function updateURL() {
    history.replaceState(null, '', '#' + encodeState());
  }

  function applyURLState() {
    if (!location.hash.length) return false;
    const params = new URLSearchParams(location.hash.slice(1));
    if (!params.has('seed')) return false;
    state.seed = parseInt(params.get('seed'), 10) >>> 0;
    state.speciesCount = clamp(parseInt(params.get('species'), 10) || 4, 2, 6);
    state.particleCount = clamp(parseInt(params.get('count'), 10) || 1000, 200, 2400);
    state.speed = parseFloat(params.get('speed')) || 1;
    state.trail = parseFloat(params.get('trail')) || 0.10;
    state.style = params.get('style') || 'balanced';
    state.wrap = params.get('wrap') !== '0';

    state.rng = mulberry32(state.seed);
    const { rules, radii } = makeRules(state.speciesCount, state.style, state.rng);
    state.radii = radii;
    state.rules = rules;

    const flat = (params.get('rules') || '').split(',').map(parseFloat);
    if (flat.length === state.speciesCount * state.speciesCount && flat.every(v => !isNaN(v))) {
      let k = 0;
      for (let a = 0; a < state.speciesCount; a++)
        for (let b = 0; b < state.speciesCount; b++)
          state.rules[a][b] = clamp(flat[k++], -1, 1);
    }
    return true;
  }

  // UI wiring
  const el = id => document.getElementById(id);
  const speciesInput = el('species'), countInput = el('count'),
        speedInput = el('speed'), trailInput = el('trail'),
        styleSelect = el('style'), wrapInput = el('wrap');

  function syncControls() {
    speciesInput.value = state.speciesCount;
    countInput.value = state.particleCount;
    speedInput.value = state.speed;
    trailInput.value = state.trail;
    styleSelect.value = state.style;
    wrapInput.checked = state.wrap;
    syncOutputs();
  }

  function syncOutputs() {
    el('speciesVal').textContent = state.speciesCount;
    el('countVal').textContent = state.particleCount;
    el('speedVal').textContent = state.speed.toFixed(1);
    el('trailVal').textContent = state.trail.toFixed(2);
  }

  speciesInput.addEventListener('input', e => {
    state.speciesCount = parseInt(e.target.value, 10);
    syncOutputs();
    reset(true);
  });
  countInput.addEventListener('input', e => {
    state.particleCount = parseInt(e.target.value, 10);
    syncOutputs();
    seedParticles();
    updateURL();
  });
  speedInput.addEventListener('input', e => {
    state.speed = parseFloat(e.target.value);
    syncOutputs();
    updateURL();
  });
  trailInput.addEventListener('input', e => {
    state.trail = parseFloat(e.target.value);
    syncOutputs();
    updateURL();
  });
  styleSelect.addEventListener('change', e => {
    state.style = e.target.value;
    reset(true);
  });
  wrapInput.addEventListener('change', e => {
    state.wrap = e.target.checked;
    updateURL();
  });

  el('shuffle').addEventListener('click', () => { newRules(true); });
  el('reset').addEventListener('click', () => { reset(true); });
  el('link').addEventListener('click', async e => {
    updateURL();
    const url = location.href;
    const btn = e.currentTarget;
    try {
      await navigator.clipboard.writeText(url);
      const original = btn.textContent;
      btn.textContent = '✓ copied';
      setTimeout(() => { btn.textContent = original; }, 1200);
    } catch (err) {
      window.prompt('Copy this link:', url);
    }
  });

  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { state.paused = !state.paused; e.preventDefault(); }
  });

  function pointerPos(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }
  canvas.addEventListener('pointerdown', e => { pointer.active = true; const p = pointerPos(e); pointer.x = p.x; pointer.y = p.y; });
  canvas.addEventListener('pointermove', e => { if (pointer.active) { const p = pointerPos(e); pointer.x = p.x; pointer.y = p.y; } });
  window.addEventListener('pointerup', () => { pointer.active = false; });

  const panel = el('panel');
  el('toggleUI').addEventListener('click', () => {
    panel.classList.toggle('hidden');
  });

  if (applyURLState()) {
    syncControls();
    seedParticles();
    drawMatrix();
  } else {
    syncControls();
    reset(true);
  }
  loop();
})();
</script>
</body>
</html>
